<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f1;
      --bg-card: #ffffff;
      --bg-column: #eceae6;
      --bg-hover: #f0eee9;
      --border: #ddd9d2;
      --border-light: #e8e5df;
      --text: #2c2b28;
      --text-secondary: #8a867e;
      --text-muted: #b0aca4;
      --accent: #b07050;
      --accent-light: #f3ebe5;
      --accent-hover: #9a6045;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
      --shadow-hover: 0 3px 8px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --radius: 8px;
      --radius-sm: 5px;
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;

      --col-backlog: #9e9a93;
      --col-todo: #b07050;
      --col-doing: #7e8aa2;
      --col-review: #a08bb5;
      --col-done: #7a9e7e;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header h1 span {
      color: var(--text-muted);
      font-weight: 400;
    }
    .btn-new {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-new:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }
    .btn-new svg {
      width: 14px;
      height: 14px;
    }

    /* ── Board ───────────────────────────── */
    .board {
      display: flex;
      gap: 12px;
      padding: 20px 28px;
      overflow-x: auto;
      min-height: calc(100vh - 60px);
      align-items: flex-start;
    }

    /* ── Column ──────────────────────────── */
    .column {
      flex: 0 0 280px;
      min-width: 280px;
      background: var(--bg-column);
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 100px);
    }
    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      position: sticky;
      top: 0;
    }
    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .column-count {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      background: var(--bg);
      padding: 1px 7px;
      border-radius: 10px;
    }
    .column-body {
      padding: 0 10px 10px;
      flex: 1;
      overflow-y: auto;
      min-height: 60px;
    }
    .column-body.drag-over {
      background: var(--accent-light);
      border-radius: 0 0 var(--radius) var(--radius);
    }

    /* ── Card ────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: box-shadow 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
      box-shadow: var(--shadow);
      position: relative;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
    }
    .card:active {
      cursor: grabbing;
    }
    .card.dragging {
      opacity: 0.4;
      transform: scale(0.97);
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 8px;
      color: var(--text);
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .card-agent {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid var(--border-light);
    }
    .card-priority {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .card-priority.alta { color: var(--accent); }
    .card-priority.media { color: var(--text-secondary); }
    .card-priority.baja { color: var(--text-muted); }
    .card-desc {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.45;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: none;
      gap: 2px;
    }
    .card:hover .card-actions {
      display: flex;
    }
    .card-action-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: var(--bg);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all 0.1s;
    }
    .card-action-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    .card-action-btn svg {
      width: 12px;
      height: 12px;
    }
    .card-output {
      margin-top: 8px;
      padding: 8px 10px;
      background: #f8f7f4;
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--col-done);
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      max-height: 80px;
      overflow-y: auto;
    }
    .card-error {
      margin-top: 8px;
      padding: 8px 10px;
      background: #fdf5f3;
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--accent);
      font-size: 11px;
      color: var(--accent);
      line-height: 1.4;
    }

    /* ── Modal ───────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,43,40,0.25);
      backdrop-filter: blur(2px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal {
      background: var(--bg-card);
      border-radius: 12px;
      width: 520px;
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      border: 1px solid var(--border-light);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
      border-bottom: 1px solid var(--border-light);
    }
    .modal-header h2 {
      font-size: 15px;
      font-weight: 600;
    }
    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .modal-close:hover {
      background: var(--bg);
      color: var(--text);
    }
    .modal-body {
      padding: 16px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s;
      outline: none;
    }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--accent);
    }
    .field textarea {
      resize: vertical;
      min-height: 70px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
    }
    .field-row {
      display: flex;
      gap: 12px;
    }
    .field-row .field {
      flex: 1;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 24px 20px;
    }
    .btn {
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
    }
    .btn-cancel {
      background: var(--bg);
      color: var(--text-secondary);
    }
    .btn-cancel:hover {
      background: var(--bg-column);
    }
    .btn-save {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-save:hover {
      background: var(--accent-hover);
    }
    .btn-delete {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      margin-right: auto;
    }
    .btn-delete:hover {
      background: #fdf5f3;
    }

    /* ── Watcher status ─────────────────── */
    .watcher-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .watcher-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--col-done);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Scrollbar ───────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Empty state ─────────────────────── */
    .empty-col {
      text-align: center;
      padding: 20px 10px;
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="logo">K</div>
      <h1>Agente Kanban <span>— tareas para agentes IA</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="watcher-status">
        <div class="watcher-dot"></div>
        watcher
      </div>
      <button class="btn-new" onclick="openModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva tarea
      </button>
    </div>
  </div>

  <div class="board" id="board"></div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nueva tarea</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Título</label>
          <input type="text" id="f-title" placeholder="¿Qué tiene que hacer el agente?">
        </div>
        <div class="field">
          <label>Descripción</label>
          <input type="text" id="f-desc" placeholder="Contexto breve (opcional)">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Agente</label>
            <select id="f-agent">
              <option value="claude-code">Claude Code</option>
              <option value="claude-api">Claude API</option>
              <option value="custom-script">Script custom</option>
              <option value="copilot">Copilot / Cursor</option>
              <option value="script">Script sin IA</option>
            </select>
          </div>
          <div class="field">
            <label>Prioridad</label>
            <select id="f-priority">
              <option value="media">Media</option>
              <option value="alta">Alta</option>
              <option value="baja">Baja</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Prompt para el agente</label>
          <textarea id="f-prompt" placeholder="Instrucciones detalladas que recibirá el agente..."></textarea>
        </div>
        <div class="field">
          <label>Archivos de contexto (uno por línea)</label>
          <textarea id="f-files" rows="2" style="min-height:44px;" placeholder="src/nominas.py&#10;docs/requisitos.md"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-delete" id="btn-delete" style="display:none" onclick="deleteTask()">Eliminar</button>
        <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-save" onclick="saveTask()">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ───────────────────────────────
    let tasks = [];
    let editingId = null;
    const COLUMNS = [
      { id: 'BACKLOG', label: 'Backlog', color: '#9e9a93' },
      { id: 'TODO',    label: 'Todo',    color: '#b07050' },
      { id: 'DOING',   label: 'Doing',   color: '#7e8aa2' },
      { id: 'REVIEW',  label: 'Review',  color: '#a08bb5' },
      { id: 'DONE',    label: 'Done',    color: '#7a9e7e' },
    ];

    // ── API ─────────────────────────────────
    async function fetchTasks() {
      const res = await fetch('/api/tasks');
      tasks = await res.json();
      render();
    }

    async function apiCreateTask(data) {
      const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return res.json();
    }

    async function apiUpdateTask(id, data) {
      const res = await fetch(`/api/tasks/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return res.json();
    }

    async function apiMoveTask(id, newStatus) {
      const res = await fetch(`/api/tasks/${id}/move`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_id: id, new_status: newStatus }),
      });
      return res.json();
    }

    async function apiDeleteTask(id) {
      await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    }

    // ── Render ──────────────────────────────
    function render() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      for (const col of COLUMNS) {
        const colTasks = tasks.filter(t => t.status === col.id);
        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.innerHTML = `
          <div class="column-header">
            <div class="column-title">
              <div class="column-dot" style="background:${col.color}"></div>
              ${col.label}
            </div>
            <span class="column-count">${colTasks.length}</span>
          </div>
          <div class="column-body" data-status="${col.id}"></div>
        `;

        const body = colEl.querySelector('.column-body');

        // Drag & drop zone
        body.addEventListener('dragover', (e) => {
          e.preventDefault();
          body.classList.add('drag-over');
        });
        body.addEventListener('dragleave', () => {
          body.classList.remove('drag-over');
        });
        body.addEventListener('drop', async (e) => {
          e.preventDefault();
          body.classList.remove('drag-over');
          const taskId = e.dataTransfer.getData('text/plain');
          if (!taskId) return;
          const newStatus = body.dataset.status;
          await apiMoveTask(taskId, newStatus);
          await fetchTasks();
        });

        if (colTasks.length === 0) {
          body.innerHTML = '<div class="empty-col">Sin tareas</div>';
        } else {
          for (const task of colTasks) {
            body.appendChild(createCard(task));
          }
        }

        board.appendChild(colEl);
      }
    }

    function createCard(task) {
      const el = document.createElement('div');
      el.className = 'card';
      el.draggable = true;
      el.dataset.id = task.id;

      el.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', task.id);
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
      });

      let extras = '';
      if (task.output) {
        const short = task.output.length > 150 ? task.output.slice(0, 150) + '…' : task.output;
        extras += `<div class="card-output">${escHtml(short)}</div>`;
      }
      if (task.error) {
        extras += `<div class="card-error">${escHtml(task.error)}</div>`;
      }

      el.innerHTML = `
        <div class="card-actions">
          <button class="card-action-btn" onclick="event.stopPropagation();openModal('${task.id}')" title="Editar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
        <div class="card-title">${escHtml(task.title)}</div>
        ${task.description ? `<div class="card-desc">${escHtml(task.description)}</div>` : ''}
        <div class="card-meta">
          <span class="card-agent">${escHtml(task.agent)}</span>
          <span class="card-priority ${task.priority}">${task.priority}</span>
        </div>
        ${extras}
      `;

      el.addEventListener('dblclick', () => openModal(task.id));

      return el;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ── Modal ───────────────────────────────
    function openModal(taskId = null) {
      editingId = taskId;
      const modal = document.getElementById('modal');
      const title = document.getElementById('modal-title');
      const btnDel = document.getElementById('btn-delete');

      if (taskId) {
        const task = tasks.find(t => t.id === taskId);
        if (!task) return;
        title.textContent = 'Editar tarea';
        document.getElementById('f-title').value = task.title;
        document.getElementById('f-desc').value = task.description || '';
        document.getElementById('f-agent').value = task.agent;
        document.getElementById('f-priority').value = task.priority;
        document.getElementById('f-prompt').value = task.prompt || '';
        document.getElementById('f-files').value = (task.context_files || []).join('\n');
        btnDel.style.display = 'block';
      } else {
        title.textContent = 'Nueva tarea';
        document.getElementById('f-title').value = '';
        document.getElementById('f-desc').value = '';
        document.getElementById('f-agent').value = 'claude-code';
        document.getElementById('f-priority').value = 'media';
        document.getElementById('f-prompt').value = '';
        document.getElementById('f-files').value = '';
        btnDel.style.display = 'none';
      }

      modal.classList.add('open');
      setTimeout(() => document.getElementById('f-title').focus(), 100);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editingId = null;
    }

    async function saveTask() {
      const data = {
        title: document.getElementById('f-title').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        agent: document.getElementById('f-agent').value,
        priority: document.getElementById('f-priority').value,
        prompt: document.getElementById('f-prompt').value.trim(),
        context_files: document.getElementById('f-files').value.trim().split('\n').filter(Boolean),
      };

      if (!data.title) {
        document.getElementById('f-title').focus();
        return;
      }

      if (editingId) {
        await apiUpdateTask(editingId, data);
      } else {
        await apiCreateTask(data);
      }

      closeModal();
      await fetchTasks();
    }

    async function deleteTask() {
      if (!editingId) return;
      if (!confirm('¿Eliminar esta tarea?')) return;
      await apiDeleteTask(editingId);
      closeModal();
      await fetchTasks();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'n' && !document.querySelector('.modal-overlay.open') && e.target === document.body) {
        e.preventDefault();
        openModal();
      }
    });

    // ── Polling for live updates ────────────
    let lastJson = '';
    async function poll() {
      try {
        const res = await fetch('/api/tasks');
        const text = await res.text();
        if (text !== lastJson) {
          lastJson = text;
          tasks = JSON.parse(text);
          render();
        }
      } catch (e) {}
    }
    setInterval(poll, 3000);

    // ── Init ────────────────────────────────
    fetchTasks();
  </script>
</body>
</html>
